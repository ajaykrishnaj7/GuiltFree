name: Quality Gates

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-and-coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Coverage Gate (>=90%)
        run: npm run test:coverage:check

      - name: Build Coverage Summary
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        id: coverage_summary
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'coverage/coverage-final.json';
          const out = process.env.GITHUB_OUTPUT;
          if (!fs.existsSync(path)) {
            fs.appendFileSync(out, `markdown<<EOF\nCoverage report file not found.\nEOF\n`);
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(path, 'utf8'));
          const totals = {
            statements: { covered: 0, total: 0 },
            branches: { covered: 0, total: 0 },
            functions: { covered: 0, total: 0 },
            lines: { covered: 0, total: 0 },
          };
          for (const file of Object.values(data)) {
            for (const count of Object.values(file.s || {})) {
              totals.statements.total += 1;
              if (count > 0) totals.statements.covered += 1;
            }
            for (const counts of Object.values(file.b || {})) {
              for (const count of counts) {
                totals.branches.total += 1;
                if (count > 0) totals.branches.covered += 1;
              }
            }
            for (const count of Object.values(file.f || {})) {
              totals.functions.total += 1;
              if (count > 0) totals.functions.covered += 1;
            }
            for (const count of Object.values(file.l || {})) {
              totals.lines.total += 1;
              if (count > 0) totals.lines.covered += 1;
            }
          }
          const pct = (covered, total) => (total === 0 ? '100.00' : ((covered / total) * 100).toFixed(2));
          const markdown = [
            '### Coverage Summary',
            '',
            '| Metric | Coverage | Covered / Total |',
            '|---|---:|---:|',
            `| Statements | ${pct(totals.statements.covered, totals.statements.total)}% | ${totals.statements.covered} / ${totals.statements.total} |`,
            `| Branches | ${pct(totals.branches.covered, totals.branches.total)}% | ${totals.branches.covered} / ${totals.branches.total} |`,
            `| Functions | ${pct(totals.functions.covered, totals.functions.total)}% | ${totals.functions.covered} / ${totals.functions.total} |`,
            `| Lines | ${pct(totals.lines.covered, totals.lines.total)}% | ${totals.lines.covered} / ${totals.lines.total} |`,
            '',
            '_Generated by CI coverage gate._',
          ].join('\n');
          fs.appendFileSync(out, `markdown<<EOF\n${markdown}\nEOF\n`);
          NODE

      - name: Comment Coverage On PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v7
        env:
          COVERAGE_MD: ${{ steps.coverage_summary.outputs.markdown }}
        with:
          script: |
            const marker = '<!-- coverage-summary-comment -->';
            const body = `${marker}\n${process.env.COVERAGE_MD || 'Coverage summary unavailable.'}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
